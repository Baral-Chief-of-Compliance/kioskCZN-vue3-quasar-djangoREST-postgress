server {
    listen 443 ssl default_server fastopen=256;
    charset     utf-8;
    server_name kiosk-czn;
    
    keepalive_timeout  30;
    client_header_timeout 20;
    client_body_timeout 20;
    reset_timedout_connection on;
    send_timeout 20;
    sendfile on;
    tcp_nopush on;
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    # ограничение на рзамер загружаемого файла
    client_max_body_size 50m;
    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss 
               application/json image/svg+xml;

    # Сертификаты
    ssl_certificate /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/privkey.key;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;


    # ========== Django Статика ==========
    location ^~ /api/media/ {
        alias /django-app-media/;
        expires 30d;
    }

    location ^~ /api/static/ {
        alias /django-app-staticfiles/;
        expires 1y;
    }

     # ========== DJANGO API ==========
    location ^~ /api/ {
        # rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self'";
        proxy_set_header Host $http_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_redirect off;
        proxy_buffering off;
        proxy_cache off;

    }

    # ========== SMART-ASSISTENT ==========
    location ^~ /smart-assistent/{
        alias /home/app/smart-assistent/;
        index  index.html index.htm;
        try_files $uri $uri/ =404;

        types {
            text/css css;
            application/javascript js;
            text/html html;
        }

    }

    # ========== GAMES ==========
    location ^~ /games/ {
        alias /home/app/games/;
        index  index.html index.htm;
        try_files $uri $uri/ =404;

        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "upgrade-insecure-requests" always;

        location ~* \.wasm$ {
            default_type application/wasm;
        }
    }

    # ========== FRONTEND ==========
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Редирект для фронтенда (не трогаем /api/)
    location ~ ^/src/assets/(.*)$ {
        return 301 /assets/$1;
    }
    
    # Статика фронтенда
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Общая статика фронтенда (автоматически исключает /api/ благодаря ^~ выше)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

}


